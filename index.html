<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400&display=swap"
    />
    <link rel="stylesheet" href="/css/reset.css" />
    <link rel="stylesheet" href="/css/css-utils.css" />
    <link rel="stylesheet" href="/css/fonts.css" />
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="stylesheet" href="/css/panel-list.css" />
    <link rel="stylesheet" href="/css/panel-scroll.css" />
    <link rel="stylesheet" href="/css/skeleton.css" />
    <link rel="stylesheet" href="/css/article.css" />
    <link rel="stylesheet" href="/css/blog.css" />
    <link rel="stylesheet" href="/css/code.css" />
    <link rel="stylesheet" href="/css/music-panel.css" />
    <link rel="stylesheet" href="/css/moodboard-panel.css" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <title>dan.moi</title>

    <!-- Open Graph -->
    <meta property="og:title" content="dan hemerlein" />
    <meta property="og:description" content="Dan Hemerlein's website." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dan.moi" />
    <meta property="og:image" content="https://dan.moi/assets/headshot.jpg" />
    <meta property="og:image:alt" content="Dan Hemerlein" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="dan hemerlein" />
    <meta name="twitter:description" content="Dan Hemerlein's website." />
    <meta name="twitter:image" content="https://dan.moi/assets/headshot.jpg" />
    <meta name="twitter:image:alt" content="Dan Hemerlein" />

    <script src="/contentful-env.js"></script>
  </head>
  <body>
    <main
      class="main-content w-full max-w-full overflow-hidden flex items-center justify-center"
    >
      <div class="container w-full max-w-full min-h-0 flex flex-col h-full">
        <div class="paragraph-container flex flex-col max-w-full">
          <p class="body-text intro-line">
            Dan Hemerlein is a reader first and a
            <dropdown-trigger
              class="middle-line-mobile-margin--note-taker"
              for="blog"
              bg="var(--color-mint)"
              bg-open="var(--color-lime)"
              body-bg="var(--color-spring)"
              >note taker</dropdown-trigger
            >
            second.
          </p>
          <dropdown-panel id="blog" variant="scroll">
            <blog-panel
              class="flex flex-col flex-1 min-h-0 min-w-0 w-full max-w-full overflow-hidden"
            ></blog-panel>
          </dropdown-panel>
          <p class="body-text middle-line middle-line-mobile-margin">
            He also
            <dropdown-trigger
              for="writes-code"
              bg="var(--color-lavender)"
              bg-open="var(--color-orchid)"
              body-bg="var(--color-orchid-soft)"
              >writes code,</dropdown-trigger
            >
            <dropdown-trigger
              for="makes-music"
              bg="var(--color-sky)"
              bg-open="var(--color-azure)"
              body-bg="var(--color-azure-soft)"
              >makes music,</dropdown-trigger
            >

            and

            <dropdown-trigger
              class="middle-line-mobile-margin"
              for="collects-moods"
              bg="var(--color-aqua)"
              bg-open="var(--color-cyan)"
              body-bg="var(--color-cyan-soft)"
              >collects moods.</dropdown-trigger
            >
          </p>
          <dropdown-panel id="writes-code" variant="scroll">
            <code-panel></code-panel>
          </dropdown-panel>
          <dropdown-panel id="makes-music" variant="scroll">
            <music-panel></music-panel>
          </dropdown-panel>
          <dropdown-panel id="collects-moods" variant="scroll">
            <moodboard-panel></moodboard-panel>
          </dropdown-panel>
          <p class="body-text bottom-line">
            Based in nyc and it's super trill.
          </p>
        </div>
        <video-element
          class="hero-image"
          src="/assets/ufo-optimized.mov"
          show-controls
        ></video-element>
        <video-element
          class="image-dock"
          src="/assets/ufo-optimized.mov"
          aria-hidden="true"
        ></video-element>
      </div>
    </main>
    <script src="/js/layout-debug.js" defer></script>
    <script src="/js/dropdown.js" defer></script>
    <script src="/js/accessible-select.js" defer></script>
    <script src="/js/image.js" defer></script>
    <script src="/js/video.js" defer></script>
    <script src="/js/dropdown-image.js" defer></script>
    <script src="/js/contentful-graphql.js" defer></script>
    <script type="module" src="/js/blog-panel.js"></script>
    <script type="module" src="/js/code-panel.js"></script>
    <script type="module" src="/js/music-panel.js"></script>
    <script type="module" src="/js/moodboard-panel.js"></script>
    <script src="/js/dev-mode.js" defer></script>
  </body>
</html>
